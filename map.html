<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>訪問地図 - サウナログ</title>
  <link rel="stylesheet" href="style.css">
  <!-- Leaflet（地図ライブラリ）の CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  >
</head>
<body class="map-page">
  <div class="container container-wide">
    <header>
      <h1>🗺️ 訪問地図</h1>
      <p class="subtitle">訪問したサウナ施設をマップで確認</p>

      <nav class="page-nav" aria-label="メインメニュー">
        <a href="index.html" class="nav-link">記録追加</a>
        <a href="list.html" class="nav-link">記録一覧</a>
        <a href="calendar.html" class="nav-link">カレンダー</a>
        <a href="map.html" class="nav-link active" aria-current="page">地図</a>
        <a href="graph.html" class="nav-link">訪問数</a>
      </nav>

      <!-- ログイン・ユーザー情報（auth.js が更新） -->
      <div class="auth-bar">
        <button type="button" id="login-btn" class="btn-login">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Googleでログイン
        </button>
        <div id="user-info" class="user-info hidden">
          <img id="user-avatar" class="user-avatar" src="" alt="">
          <span id="user-name" class="user-name"></span>
          <button type="button" id="logout-btn" class="btn-logout">ログアウト</button>
        </div>
      </div>
    </header>

    <p id="map-hint" class="hint map-hint">
      ピンをタップすると、その施設の記録一覧が下に表示されます。
      初回訪問時に住所を登録し、位置情報が取得できた施設のみ表示されます。
    </p>

    <p id="map-empty" class="empty-message hidden">
      地図に表示できる施設がありません。記録ページで初回訪問の施設に住所を入力してください。
    </p>

    <!-- Leaflet が地図を描画する領域 -->
    <div id="map" class="map-container" role="application" aria-label="訪問施設マップ"></div>

    <!-- マーカー選択時に記録一覧を表示 -->
    <section class="map-records-section hidden" id="map-records-section">
      <h2 id="map-records-title">施設の記録</h2>
      <ul id="map-records-list" class="log-list map-records-list"></ul>
    </section>

    <section class="map-pending-section hidden" id="map-pending-section">
      <h2>位置情報を取得中の施設</h2>
      <p class="hint">住所は登録済みですが、地図の座標が未取得の施設です。「位置を再取得」で再試行できます。</p>
      <ul id="map-pending-list" class="pending-list"></ul>
    </section>
  </div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="js/storage.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/map.js"></script>
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/cloud-storage.js"></script>
</body>
</html>
