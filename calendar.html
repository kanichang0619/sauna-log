<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>カレンダー - サウナログ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>📅 カレンダー</h1>
      <p class="subtitle">訪問日をカレンダーで確認</p>

      <nav class="page-nav" aria-label="メインメニュー">
        <a href="index.html" class="nav-link">記録追加</a>
        <a href="list.html" class="nav-link">記録一覧</a>
        <a href="calendar.html" class="nav-link active" aria-current="page">カレンダー</a>
        <a href="map.html" class="nav-link">地図</a>
        <a href="graph.html" class="nav-link">訪問数</a>
      </nav>

      <!-- ログイン・ユーザー情報（auth.js が更新） -->
      <div class="auth-bar">
        <button type="button" id="login-btn" class="btn-login">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Googleでログイン
        </button>
        <div id="user-info" class="user-info hidden">
          <img id="user-avatar" class="user-avatar" src="" alt="">
          <span id="user-name" class="user-name"></span>
          <button type="button" id="logout-btn" class="btn-logout">ログアウト</button>
        </div>
      </div>
    </header>

    <!-- 月ナビゲーション＋カレンダー本体 -->
    <section class="calendar-section">

      <!-- 前月・年月表示・次月 ボタン -->
      <div class="calendar-nav">
        <button type="button" class="btn-secondary btn-small" id="prev-month-btn">&#8592; 前月</button>
        <h2 id="calendar-title" class="calendar-title">読み込み中...</h2>
        <button type="button" class="btn-secondary btn-small" id="next-month-btn">次月 &#8594;</button>
      </div>

      <!--
        カレンダーグリッド（7列）
        曜日ヘッダー行は HTML に直書き、日付セルは JavaScript で追加する
      -->
      <div class="calendar-grid" id="calendar-grid" role="grid" aria-label="カレンダー">
        <!-- 曜日ヘッダー行 -->
        <div class="cal-header cal-sun" role="columnheader">日</div>
        <div class="cal-header" role="columnheader">月</div>
        <div class="cal-header" role="columnheader">火</div>
        <div class="cal-header" role="columnheader">水</div>
        <div class="cal-header" role="columnheader">木</div>
        <div class="cal-header" role="columnheader">金</div>
        <div class="cal-header cal-sat" role="columnheader">土</div>
        <!-- 日付セルは calendar.js が生成して追加する -->
      </div>

      <!-- 記録がない月に表示するメッセージ -->
      <p id="calendar-empty" class="empty-message hidden">
        この月の記録はありません。
        <a href="index.html">記録ページ</a>から追加してください。
      </p>
    </section>

    <!-- 日付をクリックしたときに表示する、その日の記録一覧 -->
    <section class="log-section hidden" id="day-records-section">
      <h2 id="day-records-title">選択した日の記録</h2>
      <ul id="day-records-list" class="log-list"></ul>
    </section>
  </div>

  <!-- 共通モジュールを読み込む（storage → utils → calendar の順に依存） -->
  <script src="js/storage.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/calendar.js"></script>
  <script type="module" src="js/auth.js"></script>
</body>
</html>
