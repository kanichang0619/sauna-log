<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>記録一覧 - サウナログ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🧖 サウナログ</h1>
      <p class="subtitle">サウナ体験を記録しよう</p>

      <nav class="page-nav" aria-label="メインメニュー">
        <a href="index.html" class="nav-link">記録追加</a>
        <a href="list.html" class="nav-link active" aria-current="page">記録一覧</a>
        <a href="calendar.html" class="nav-link">カレンダー</a>
        <a href="map.html" class="nav-link">地図</a>
        <a href="graph.html" class="nav-link">訪問数</a>
      </nav>

      <!-- ログイン・ユーザー情報（auth.js が更新） -->
      <div class="auth-bar">
        <button type="button" id="login-btn" class="btn-login">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Googleでログイン
        </button>
        <div id="user-info" class="user-info hidden">
          <img id="user-avatar" class="user-avatar" src="" alt="">
          <span id="user-name" class="user-name"></span>
          <button type="button" id="logout-btn" class="btn-logout">ログアウト</button>
        </div>
      </div>

      <div class="stats-bar" aria-live="polite">
        <span class="stats-label">合計訪問回数</span>
        <span id="total-visits" class="stats-value">0</span>
        <span class="stats-unit">回</span>
      </div>
    </header>

    <section class="log-section">
      <div class="log-section-header">
        <h2>記録一覧</h2>
        <div class="data-controls">
          <button type="button" class="btn-secondary btn-small" id="export-btn">エクスポート</button>
          <button type="button" class="btn-secondary btn-small" id="import-btn">インポート</button>
          <input type="file" id="import-file" accept=".json" class="hidden">
        </div>
      </div>

      <!-- 検索・ソートツールバー -->
      <div class="toolbar">
        <div class="form-group toolbar-item">
          <label for="search-input">検索</label>
          <input type="search" id="search-input" placeholder="施設名・訪問日時・住所">
        </div>
        <div class="toolbar-row">
          <div class="form-group toolbar-item">
            <label for="sort-by">並び替え</label>
            <select id="sort-by">
              <option value="visitDateTime">訪問日時</option>
              <option value="facility">施設名</option>
              <option value="seiri">整い度</option>
            </select>
          </div>
          <div class="form-group toolbar-item">
            <label for="sort-order">順序</label>
            <select id="sort-order">
              <option value="desc">降順（新しい・高い順）</option>
              <option value="asc">昇順</option>
            </select>
          </div>
        </div>
      </div>

      <!-- インポート結果などのメッセージ -->
      <p id="list-message" class="save-message hidden" role="status"></p>

      <p id="empty-message" class="empty-message">
        まだ記録がありません。<a href="index.html">記録追加ページ</a>から追加してください。
      </p>
      <p id="no-result-message" class="empty-message hidden">検索条件に一致する記録がありません。</p>
      <ul id="log-list" class="log-list"></ul>
    </section>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/list.js"></script>
  <script type="module" src="js/auth.js"></script>
</body>
</html>
