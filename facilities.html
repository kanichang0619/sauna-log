<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>施設一覧 - サウナログ</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="/sauna-log/manifest.json">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="サウナログ">
  <link rel="apple-touch-icon" href="/sauna-log/icons/apple-touch-icon.png">
  <script>if(navigator.standalone)document.documentElement.style.setProperty('--pwa-top','60px')</script>
</head>
<body>
  <div class="container">
    <header>
      <h1>🧖 サウナログ</h1>
      <p class="subtitle">サウナ体験を記録しよう</p>

      <nav class="page-nav" aria-label="メインメニュー">
        <a href="index.html" class="nav-link">記録追加</a>
        <a href="list.html" class="nav-link">記録一覧</a>
        <a href="calendar.html" class="nav-link">カレンダー</a>
        <a href="map.html" class="nav-link">地図</a>
        <a href="graph.html" class="nav-link">訪問数</a>
        <a href="facilities.html" class="nav-link active" aria-current="page">施設一覧</a>
      </nav>

      <div class="auth-bar">
        <button type="button" id="login-btn" class="btn-login">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Googleでログイン
        </button>
        <div id="user-info" class="user-info hidden">
          <img id="user-avatar" class="user-avatar" src="" alt="">
          <span id="user-name" class="user-name"></span>
          <button type="button" id="logout-btn" class="btn-logout">ログアウト</button>
        </div>
      </div>

      <div class="stats-bar" aria-live="polite">
        <span class="stats-label">訪問済み施設数</span>
        <span id="facility-count" class="stats-value">0</span>
        <span class="stats-unit">施設</span>
      </div>
    </header>

    <section class="log-section">
      <h2>施設一覧</h2>

      <div class="toolbar">
        <div class="form-group toolbar-item">
          <label for="search-input">検索</label>
          <input type="search" id="search-input" placeholder="施設名・住所">
        </div>
        <div class="toolbar-row">
          <div class="form-group toolbar-item">
            <label for="sort-by">並び替え</label>
            <select id="sort-by">
              <option value="name">施設名</option>
              <option value="address">所在地</option>
              <option value="visits">訪問回数</option>
              <option value="lastVisit">最終訪問日</option>
            </select>
          </div>
          <div class="form-group toolbar-item">
            <label for="sort-order">順序</label>
            <select id="sort-order">
              <option value="asc">昇順（A→Z・少ない順）</option>
              <option value="desc">降順（Z→A・多い順）</option>
            </select>
          </div>
        </div>
      </div>

      <p id="empty-message" class="empty-message">
        まだ施設が登録されていません。<a href="index.html">記録追加ページ</a>から記録を追加すると施設が登録されます。
      </p>
      <p id="no-result-message" class="empty-message hidden">検索条件に一致する施設がありません。</p>
      <ul id="facility-list" class="facility-list"></ul>
    </section>
  </div>

  <!-- 施設詳細・編集モーダル -->
  <div id="facility-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="modal-facility-name">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modal-facility-name" class="modal-title"></h3>
        <button type="button" id="modal-close" class="btn-modal-close" aria-label="閉じる">✕</button>
      </div>

      <!-- 詳細表示モード -->
      <div id="modal-detail-view">
        <p id="detail-address" class="facility-detail-address"></p>
        <div class="facility-detail-stats">
          <span id="detail-visits" class="facility-detail-stat"></span>
          <span id="detail-last-visit" class="facility-detail-stat hidden"></span>
        </div>
        <div class="form-actions" style="margin-top: 1rem;">
          <button type="button" id="modal-edit-btn" class="btn-edit">施設情報を編集</button>
        </div>
      </div>

      <!-- 編集モード -->
      <div id="modal-edit-view" class="hidden">
        <div class="form-group">
          <label for="edit-facility-name">施設名</label>
          <input type="text" id="edit-facility-name" placeholder="例：○○サウナ">
        </div>
        <div class="form-group">
          <label for="edit-facility-address">住所</label>
          <input type="text" id="edit-facility-address" placeholder="例：東京都渋谷区○○ 1-2-3">
          <p class="hint">住所を変更すると地図の位置情報が再取得されます。</p>
        </div>
        <p id="edit-message" class="save-message hidden" role="status"></p>
        <div class="form-actions">
          <button type="button" id="save-facility-btn" class="btn-primary">保存</button>
          <button type="button" id="cancel-edit-btn" class="btn-secondary">キャンセル</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/facilities.js"></script>
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/cloud-storage.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker
          .register("/sauna-log/service-worker.js", { scope: "/sauna-log/" })
          .then(() => console.log("[SW] Service Worker 登録完了"))
          .catch((err) => console.error("[SW] Service Worker 登録失敗:", err));
      });
    }
  </script>
</body>
</html>
