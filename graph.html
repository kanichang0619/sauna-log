<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ランキング - サウナログ</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="/sauna-log/manifest.json">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="サウナログ">
  <link rel="apple-touch-icon" href="/sauna-log/icons/apple-touch-icon.png">
  <script>if(navigator.standalone)document.documentElement.style.setProperty('--pwa-top','60px')</script>
</head>
<body>
  <div class="container">
    <header>
      <h1>📊 ランキング</h1>
      <p class="subtitle">上位5位ランキング</p>

      <nav class="page-nav" aria-label="メインメニュー">
        <a href="index.html" class="nav-link">記録追加</a>
        <a href="list.html" class="nav-link">記録一覧</a>
        <a href="facilities.html" class="nav-link">施設一覧</a>
        <a href="calendar.html" class="nav-link">カレンダー</a>
        <a href="graph.html" class="nav-link active" aria-current="page">ランキング</a>
      </nav>

      <!-- ログイン・ユーザー情報（auth.js が更新） -->
      <div class="auth-bar">
        <button type="button" id="login-btn" class="btn-login">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Googleでログイン
        </button>
        <div id="user-info" class="user-info hidden">
          <img id="user-avatar" class="user-avatar" src="" alt="">
          <span id="user-name" class="user-name"></span>
          <button type="button" id="logout-btn" class="btn-logout">ログアウト</button>
        </div>
      </div>
    </header>

    <section class="ranking-section">
      <h2 class="ranking-title">🏆 施設ごとの訪問回数</h2>
      <ol id="visit-ranking" class="ranking-list"></ol>
      <p id="visit-ranking-empty" class="empty-message hidden">
        まだ記録がありません。<a href="index.html">記録ページ</a>から追加してください。
      </p>
    </section>

    <section class="ranking-section">
      <h2 class="ranking-title">✨ 整い度ランキング</h2>
      <p class="ranking-subtitle">各施設の最高整い度スコア（100点満点）</p>
      <ol id="seiri-ranking" class="ranking-list"></ol>
      <p id="seiri-ranking-empty" class="empty-message hidden">
        まだ記録がありません。<a href="index.html">記録ページ</a>から追加してください。
      </p>
    </section>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/graph.js"></script>
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/cloud-storage.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker
          .register("/sauna-log/service-worker.js", { scope: "/sauna-log/" })
          .then(() => console.log("[SW] Service Worker 登録完了"))
          .catch((err) => console.error("[SW] Service Worker 登録失敗:", err));
      });
    }
  </script>
</body>
</html>
