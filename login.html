<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン - サウナログ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container" style="padding-top: 4rem; text-align: center;">
    <h1>🧖 サウナログ</h1>
    <p class="subtitle" style="margin-bottom: 2rem;">Googleアカウントでログイン</p>

    <button type="button" id="google-login-btn" class="btn-login">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Googleでログイン
    </button>

    <p id="login-msg" style="margin-top: 1.5rem; font-size: 0.9rem; color: #a0aec0;"></p>
  </div>

  <script type="module">
    import { auth } from "./js/firebase-config.js";
    import {
      GoogleAuthProvider,
      signInWithPopup,
      onAuthStateChanged,
    } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

    const btn = document.getElementById("google-login-btn");
    const msg = document.getElementById("login-msg");

    // すでにログイン済みなら即座に閉じる
    onAuthStateChanged(auth, (user) => {
      if (user) {
        msg.textContent = "ログイン済みです。このウィンドウを閉じてください。";
        btn.classList.add("hidden");
        window.close();
      }
    });

    btn.addEventListener("click", async () => {
      btn.disabled = true;
      msg.textContent = "ログイン中...";
      try {
        const provider = new GoogleAuthProvider();
        await signInWithPopup(auth, provider);
        msg.textContent = "ログインしました！ウィンドウを閉じています...";
        window.close();
      } catch (error) {
        btn.disabled = false;
        if (
          error.code === "auth/popup-closed-by-user" ||
          error.code === "auth/cancelled-popup-request"
        ) {
          msg.textContent = "";
          return;
        }
        msg.textContent = "ログインに失敗しました。もう一度お試しください。";
        console.error("ログインエラー:", error);
      }
    });
  </script>
</body>
</html>
